# Release workflow for EpicSteamLauncher.
# Uses internal GitSemVer validation to gate manual releases.

name: Release

on:
  # Manual-only release flow to avoid accidental tag/push releases.
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      # Why: GitSemVer reads branch/tag metadata that requires full history.
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Why: Ensure main + tags are present locally for canonical version computation.
      - name: Fetch main branch and tags
        shell: pwsh
        run: |
          git fetch --prune --tags origin +refs/heads/main:refs/remotes/origin/main

      - name: Setup .NET SDK 8.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
          cache: true
          cache-dependency-path: |
            Launcher/**/*.csproj
            Launcher/**/*.props
            Launcher/**/*.targets
            Launcher/**/*.sln
            Launcher/**/packages.lock.json

      # Why: Use internally computed semantic version as the release source of truth.
      - name: Read GitSemVer version and tag
        id: gitsemver
        shell: pwsh
        run: |
          $out = dotnet msbuild ./Launcher/EpicSteamLauncher/EpicSteamLauncher.csproj -nologo -v:m /t:GitSemVer_ComputeVersion
          $m = [regex]::Match($out, 'Version=([0-9]+\.[0-9]+\.[0-9]+)')
          if (-not $m.Success) {
            throw "Could not parse Version from GitSemVer output."
          }

          $computedVersion = $m.Groups[1].Value
          $computedTag = "v$computedVersion"
          "version=$computedVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=$computedTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # Why: Build changelog range against the most recent existing release tag.
      - name: Find previous release tag
        id: prevtag
        shell: pwsh
        run: |
          $currentTag = "${{ steps.gitsemver.outputs.tag }}"
          $previousTag = git tag --merged HEAD --list "v*" --sort=-version:refname |
            Where-Object { $_ -and $_ -ne $currentTag } |
            Select-Object -First 1

          if (-not $previousTag) {
            $previousTag = ""
          }

          "value=$previousTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # Why: Enforce commit subject format for releases when a previous release exists.
      - name: Validate release commit messages
        shell: pwsh
        run: |
          $previousTag = "${{ steps.prevtag.outputs.value }}"

          if ([string]::IsNullOrWhiteSpace($previousTag)) {
            Write-Host "No previous tag found; skipping commit lint for initial release snapshot."
            exit 0
          }

          $range = "$previousTag..HEAD"
          & ./.github/scripts/policy/validate-commit-messages.ps1 -Range $range

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      # Why: Publish explicit, grouped commits with hashes instead of generic auto-notes.
      - name: Generate release changelog
        id: releasenotes
        shell: pwsh
        env:
          CURRENT_TAG: ${{ steps.gitsemver.outputs.tag }}
          CURRENT_VERSION: ${{ steps.gitsemver.outputs.version }}
          PREVIOUS_TAG: ${{ steps.prevtag.outputs.value }}
        run: |
          $ErrorActionPreference = 'Stop'
          $repoUrl = "https://github.com/$env:GITHUB_REPOSITORY"
          $currentTag = $env:CURRENT_TAG
          $currentVersion = $env:CURRENT_VERSION
          $previousTag = $env:PREVIOUS_TAG

          New-Item -ItemType Directory -Path "${{ github.workspace }}\_release" -Force | Out-Null
          $notesPath = "${{ github.workspace }}\_release\release-notes.md"

          $range = if ([string]::IsNullOrWhiteSpace($previousTag)) { "HEAD" } else { "$previousTag..HEAD" }

          $logLines = git --no-pager log $range --no-merges --pretty=format:"%H%x09%h%x09%s%x09%an"
          $commits = @()

          if ($logLines) {
            foreach ($line in $logLines) {
              $parts = $line -split "`t", 4
              if ($parts.Length -lt 4) {
                continue
              }

              $fullSha = $parts[0]
              $shortSha = $parts[1]
              $subject = $parts[2].Trim()
              $author = $parts[3].Trim()
              $type = "other"
              $displaySubject = $subject

              if ($subject -match '^(?<type>feat|fix|perf|refactor|docs|test|chore)(\([^)]+\))?(!)?:\s*(?<rest>.+)$') {
                $type = $Matches.type.ToLowerInvariant()
                $displaySubject = $Matches.rest.Trim()
              }

              $commits += [pscustomobject]@{
                Type = $type
                Subject = $displaySubject
                ShortSha = $shortSha
                FullSha = $fullSha
                Author = $author
              }
            }
          }

          $sections = @(
            @{ Key = "feat"; Title = "Features" },
            @{ Key = "fix"; Title = "Fixes" },
            @{ Key = "perf"; Title = "Performance" },
            @{ Key = "refactor"; Title = "Refactors" },
            @{ Key = "docs"; Title = "Documentation" },
            @{ Key = "test"; Title = "Tests" },
            @{ Key = "chore"; Title = "Chores" },
            @{ Key = "other"; Title = "Other Changes" }
          )

          $lines = New-Object System.Collections.Generic.List[string]
          $lines.Add("# EpicSteamLauncher $currentTag")
          $lines.Add("")
          $lines.Add("Version: **$currentVersion**")
          $lines.Add("Date: $(Get-Date -Format 'yyyy-MM-dd')")

          if ([string]::IsNullOrWhiteSpace($previousTag)) {
            $lines.Add("Range: initial release snapshot")
          }
          else {
            $lines.Add("Range: `$previousTag..HEAD`")
          }

          $lines.Add("")

          if (-not $commits -or $commits.Count -eq 0) {
            $lines.Add("No commits found in release range.")
          }
          else {
            foreach ($section in $sections) {
              $items = $commits | Where-Object { $_.Type -eq $section.Key }
              if (-not $items -or $items.Count -eq 0) {
                continue
              }

              $lines.Add("## $($section.Title)")

              foreach ($item in $items) {
                $commitUrl = "$repoUrl/commit/$($item.FullSha)"
                $lines.Add("- `$($item.ShortSha)` $($item.Subject) - $($item.Author) ([commit]($commitUrl))")
              }

              $lines.Add("")
            }
          }

          [System.IO.File]::WriteAllLines($notesPath, $lines, [System.Text.UTF8Encoding]::new($false))
          "path=$notesPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate release notes file
        shell: pwsh
        run: |
          $path = "${{ steps.releasenotes.outputs.path }}"
          if (-not (Test-Path -LiteralPath $path)) {
            throw "Release notes file was not created: $path"
          }

          $lineCount = (Get-Content -LiteralPath $path | Measure-Object).Count
          if ($lineCount -lt 4) {
            throw "Release notes file looks empty: $path"
          }

      - name: Restore NuGet packages
        run: dotnet restore ./Launcher/EpicSteamLauncher.sln

      - name: Build solution (Release)
        run: dotnet build ./Launcher/EpicSteamLauncher.sln -c Release --no-restore

      - name: Run tests (Release)
        run: dotnet test ./Launcher/EpicSteamLauncher.Tests/EpicSteamLauncher.Tests.csproj -c Release --no-build --no-restore

      - name: Publish app (win-x64 self-contained)
        shell: pwsh
        run: |
          dotnet publish ./Launcher/EpicSteamLauncher/EpicSteamLauncher.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o ./_release/publish/win-x64

      # Why: Produce a portable package for release upload.
      - name: Package release ZIP
        id: package
        shell: pwsh
        run: |
          $zipName = "EpicSteamLauncher-win-x64-${{ steps.gitsemver.outputs.tag }}.zip"
          $zipPath = Join-Path "${{ github.workspace }}\_release" $zipName

          New-Item -ItemType Directory -Path "${{ github.workspace }}\_release" -Force | Out-Null
          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }

          Compress-Archive -Path "${{ github.workspace }}\_release\publish\win-x64\*" -DestinationPath $zipPath
          "zip=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: EpicSteamLauncher-Release-${{ steps.gitsemver.outputs.tag }}
          path: ${{ steps.package.outputs.zip }}
          if-no-files-found: error

      # Why: Publish the packaged ZIP as a GitHub Release asset.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.gitsemver.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: false
          body_path: ${{ steps.releasenotes.outputs.path }}
          files: |
            ${{ steps.package.outputs.zip }}




