# Mainline build workflow for EpicSteamLauncher.
# The .NET solution lives under Launcher/.

name: Main Build (DotNet)

on:
  push:
    # Mainline CI for merged changes to main.
    branches: [ main ]
    # Rerun only when code/build tooling/workflows change.
    paths:
      - 'Launcher/**'
      - 'CLI/**'
      - '.github/workflows/**'
  # Allow manual mainline validation from Actions tab.
  workflow_dispatch:

concurrency:
  group: build-main-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      # Full history is required for GitSemVer branch/tag lookups.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Ensure remote main and tags exist locally for deterministic versioning.
      - name: Fetch main + tags (GitSemVer)
        shell: pwsh
        run: |
          git fetch --prune --tags origin +refs/heads/main:refs/remotes/origin/main

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
          cache: true
          cache-dependency-path: |
            Launcher/**/*.csproj
            Launcher/**/*.props
            Launcher/**/*.targets
            Launcher/**/*.sln
            Launcher/**/packages.lock.json

      - name: Restore
        run: dotnet restore ./Launcher/EpicSteamLauncher.sln

      # Validate semantic version computation before build/test work begins.
      - name: Validate internal GitSemVer computes Version
        run: dotnet msbuild ./Launcher/EpicSteamLauncher/EpicSteamLauncher.csproj -nologo -v:m /t:GitSemVer_ComputeVersion

      - name: Build (Release)
        run: dotnet build ./Launcher/EpicSteamLauncher.sln -c Release --no-restore

      - name: Test (Release)
        run: dotnet test ./Launcher/EpicSteamLauncher.Tests/EpicSteamLauncher.Tests.csproj -c Release --no-build --no-restore

      # Upload compiled release outputs to simplify manual inspection/download.
      - name: Upload build output artifact
        uses: actions/upload-artifact@v7
        with:
          name: EpicSteamLauncher-Release
          path: |
            Launcher/EpicSteamLauncher/bin/Release/net8.0-windows/**
          if-no-files-found: error

